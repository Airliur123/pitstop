name: pitstop

services:
  mysql:
    image: mysql:8.4.10
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      TZ: UTC
    ports:
      - 127.0.0.1:3306:3306
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [CMD-SHELL, 'mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks: [pitstop-local]

  redis:
    image: redis:8.2.7-alpine
    restart: unless-stopped
    command: [redis-server, --appendonly, 'yes']
    ports:
      - 127.0.0.1:6379:6379
    volumes:
      - redis-data:/data
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [pitstop-local]

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      TZ: Asia/Jakarta
    ports:
      - 127.0.0.1:9000:9000
      - 127.0.0.1:9001:9001
    volumes:
      - minio-data:/data
    healthcheck:
      test: [CMD, curl, -f, http://localhost:9000/minio/health/live]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [pitstop-local]

  mailpit:
    image: axllent/mailpit:v1.30.0
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 500
      TZ: Asia/Jakarta
    ports:
      - 127.0.0.1:1025:1025
      - 127.0.0.1:8025:8025
    healthcheck:
      test: [CMD, /mailpit, readyz]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [pitstop-local]

networks:
  pitstop-local:
    name: pitstop-local

volumes:
  mysql-data:
  redis-data:
  minio-data:
